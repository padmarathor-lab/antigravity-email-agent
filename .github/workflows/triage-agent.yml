name: Triage Agent Workflow

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to push commits back

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Agent
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KNOWLEDGE_DRIVE_FOLDER_ID: ${{ secrets.KNOWLEDGE_DRIVE_FOLDER_ID }}
          DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          MODEL_TRIAGE: "llama3-8b-8192"
          MODEL_DRAFT: "llama3-70b-8192"
          LABEL_PROCESSED: "Agent-Processed"
          LABEL_NEEDS_HUMAN: "Needs-Human"
        run: |
          export PYTHONPATH="."
          python src/main.py

      - name: Commit state changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add knowledge/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update agent knowledge state" && git push)
